name: SkillNest Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install server dependencies
        run: npm install
        working-directory: ./server

      - name: Install client dependencies
        run: npm install
        working-directory: ./client

      - name: Lint server
        run: npm run lint
        working-directory: ./server

      - name: Check server import
        run: node -e "process.env.NODE_ENV='test'; import('./server.js')"
        working-directory: ./server
        env:
          JWT_SECRET: "ci_secret"
          MONGODB_URI: "mongodb://localhost:27017/skillnest-ci"
          GEMINI_API_KEY: "ci_gemini"
          CLOUDINARY_NAME: "ci_cloud"
          CLOUDINARY_API_KEY: "ci_key"
          CLOUDINARY_SECRET_KEY: "ci_secret"
          CLERK_WEBHOOK_SECRET: "whsec_ci"

      - name: Lint client
        run: npm run lint
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client
        env:
          VITE_BACKEND_URL: "http://localhost:5000"
          VITE_CLERK_PUBLISHABLE_KEY: "pk_live_placeholder"
