services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    # Using Cloud Redis from .env, so no 'depends_on' redis needed

  client:
    build: ./client
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - server
